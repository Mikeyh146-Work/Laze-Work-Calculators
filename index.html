<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Absence Trigger Checker</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2,h3{
    margin-top:0;
}

input,button{
    padding:10px;
    margin:5px 0;
}

input{
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

.status{
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    font-weight:bold;
}

.green{
    background:#d4edda;
    color:#155724;
}

.orange{
    background:#fff3cd;
    color:#856404;
}

.red{
    background:#f8d7da;
    color:#721c24;
}
</style>
</head>
<body>

<div class="container">

<h2>Absence Trigger Checker</h2>

<label>Contracted Hours Per Week</label><br>
<input type="number" id="contractHours" value="40" step="0.5">

<hr>

<h3>Add Absence</h3>

<input type="date" id="absenceDate">
<input type="number" id="absenceHours" placeholder="Hours Lost" step="0.5">
<button onclick="addAbsence()">Add Absence</button>

<table id="absenceTable">
<thead>
<tr>
<th>Date</th>
<th>Hours Lost</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="results"></div>

</div>

<script>

let absences = [];

function addAbsence(){

    const date = document.getElementById('absenceDate').value;
    const hours = parseFloat(document.getElementById('absenceHours').value);

    if(!date || !hours){
        alert('Enter a date and hours.');
        return;
    }

    absences.push({
        date: date,
        hours: hours
    });

    renderTable();
    calculateTrigger();

    document.getElementById('absenceHours').value='';
}

function removeAbsence(index){
    absences.splice(index,1);
    renderTable();
    calculateTrigger();
}

function renderTable(){

    const tbody = document.querySelector('#absenceTable tbody');
    tbody.innerHTML='';

    absences.forEach((absence,index)=>{

        tbody.innerHTML += `
        <tr>
            <td>${absence.date}</td>
            <td>${absence.hours}</td>
            <td>
                <button onclick="removeAbsence(${index})">
                    Remove
                </button>
            </td>
        </tr>`;
    });
}

function calculateTrigger(){

    const weeklyHours =
        parseFloat(document.getElementById('contractHours').value) || 0;

    const triggerHours = weeklyHours * 26 * 0.03;

    const cutoffDate = new Date();
    cutoffDate.setDate(cutoffDate.getDate() - 182);

    let rollingAbsenceHours = 0;

    absences.forEach(absence => {

        const absenceDate = new Date(absence.date);

        if(absenceDate >= cutoffDate){
            rollingAbsenceHours += absence.hours;
        }
    });

    const percentUsed =
        triggerHours > 0
        ? (rollingAbsenceHours / triggerHours) * 100
        : 0;

    let statusClass = "green";
    let statusText = "Within Trigger Threshold";

    if(percentUsed >= 100){
        statusClass = "red";
        statusText = "TRIGGER REACHED";
    }
    else if(percentUsed >= 80){
        statusClass = "orange";
        statusText = "Approaching Trigger";
    }

    document.getElementById('results').innerHTML = `
        <div class="status ${statusClass}">
            Status: ${statusText}
        </div>

        <p><strong>Trigger Threshold:</strong>
        ${triggerHours.toFixed(2)} hours</p>

        <p><strong>Absence Hours (Last 26 Weeks):</strong>
        ${rollingAbsenceHours.toFixed(2)} hours</p>

        <p><strong>Trigger Used:</strong>
        ${percentUsed.toFixed(1)}%</p>
    `;
}

document.getElementById('contractHours')
.addEventListener('input', calculateTrigger);

calculateTrigger();

</script>

</body>
</html>
